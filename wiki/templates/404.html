{% extends "base.html" %}
{% block title %}Not Found — {{ wiki_name }} Wiki{% endblock %}

{% block content %}
<div class="text-center py-20">
    <div class="text-6xl font-black text-gray-200 mb-4">404</div>
    <h1 class="text-xl font-semibold text-gray-600 mb-2">Page not found</h1>
    <p class="text-gray-400 mb-6">This wiki page doesn't exist yet.</p>
    <a href="/" class="inline-flex items-center gap-2 px-4 py-2 bg-sage-600 text-white text-sm font-medium rounded-lg hover:bg-sage-700 transition-colors">
        Back to wiki
    </a>
</div>
{% endblock %}
